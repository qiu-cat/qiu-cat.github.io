<!DOCTYPE html>
<html>
<head>
<title>Welcome to qiu-cat</title>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<link rel="icon" href="/favicon.ico" sizes="32x32">
<link rel="icon" href="/icons/favicon-180.png" sizes="180x180">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<style>
	body{
		width:100vw;
		height:100vh;
		margin: 0;
		padding:30px;
		font-family:"PingFang SC","Microsoft Yahei",Tahoma,Verdana,Arial,sans-serif;
		background-color:#fcfcfc;
		color:#191919;
	}
	#ui{
		max-height:100vh;
		max-width:35em;
		margin:10px;
		opacity:1;
		animation:start 1s 1;
	}
  a{
    color:#191919;
  }
	@media(prefers-color-scheme:dark){
		body{
			background-color:#191919;
			color:#fcfcfc;
		}
		a{
			color:#fcfcfc;
		}
	}
	@keyframes start{
		0%{
			opacity:0;
			transform:translate(0,10vw);
		}
		100%{
			opacity:1;
			transform:translate(0,0);
		}
	}
</style>
</head>
<body>
<div id="ui">
<h1>Welcome to qiu-cat!</h1>
<p><h3><script type="text/javascript">
    document.write(window.location.host);
</script> says welcome!</h3></p>

</div>
