margin-bottom:15px;

#footer{

color:#289b45;

</head>
<body>
<div id="body">
<div id="title">校验码计算器</div>

<input type="tel" id="input" placeholder="输入条码(不包含校验码)"/>

<div id="setup">
<label class="setup-label">奇数位乘:</label>
<select id="odd">
<option value="1" selected>1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
<option value="6">6</option>
<option value="7">7</option>
<option value="8">8</option>
<option value="9">9</option>
</select>

<label class="setup-label">偶数位乘:</label>
<select id="even">
<option value="1">1</option>
<option value="2">2</option>
<option value="3" selected>3</option>
<option value="4">4</option>
<option value="5">5</option>
<option value="6">6</option>
<option value="7">7</option>
<option value="8">8</option>
<option value="9">9</option>
</select>
</div>

<button id="btn" onclick="calculator()">计算</button>

<div id="result">
<h3 id="result-title">计算结果：</h3>
<div id="output"></div>
</div>
</div>
</div>
<div id="footer">

<script>
const input = document.getElementById('input');
const odd_select = document.getElementById('odd');
const even_select = document.getElementById('even');
const output = document.getElementById("output");

function calculator(){
const code = input.value;
const odd = odd_select.value;
const even = even_select.value;

if(code == ""){
error("请提供输入");
result();
}

let digits = code.replace(/\D/g,''); //移除非数字字符

//将字符串转为数字数组
const digitsArray = digits.split('').map(Number);

//计算加权和：奇数位(1-based from left)×3，偶数位×1
let sum = 0;
for(let i = 0; i < digitsArray.length;i++){
//i从0开始，所以第1位（奇数位）的索引是0

if((i + 1) % 2 === 1){
//奇数位
sum += digitsArray[i] * odd;
}else{
//偶数位
sum += digitsArray[i] * even;
}
}
            
// 计算校验码
const nextMultipleOf10 = Math.ceil(sum / 10) * 10;
const checkDigit = nextMultipleOf10 - sum;

const outputcontent = digits.split("").join("<wbr/>");

output.innerHTML = "<div id=\"output\">" + outputcontent + "<wbr/>" + checkDigit +"</div>";
}

function error(text){
const error = true;
output.innerHTML = "<div id=\"output\"></div>";
input.placeholder = text;
document.documentElement.style.setProperty("--input-color","#e5284c");
input.focus();
}

input.addEventListener('keydown', (e)=>{
if(e.key === 'Enter' && !e.shiftKey){
e.preventDefault();
calculator();
}

const cursorStart = input.selectionStart;

const newValue = oldValue.replace(/[^0-9]/g, '');

if (oldValue !== newValue) {
input.value = newValue;
//恢复插入点
input.selectionStart = cursorStart - (oldValue.length - newValue.length);
input.selectionEnd = cursorEnd - (oldValue.length - newValue.length);
}

input.addEventListener('paste', (e)=>{ //阻止粘贴
e.preventDefault();
const pasteText = (e.clipboardData || window.clipboardData).getData('text');

const numText = pasteText.replace(/[^0-9]/g, '');

const cursorPos = input.selectionStart;
const oldValue = input.value;
input.value = oldValue.slice(0, cursorPos) + numText + oldValue.slice(cursorPos);
// 恢复光标
input.selectionStart = input.selectionEnd = cursorPos + numText.length;
});

</script>
</body>
</html>
