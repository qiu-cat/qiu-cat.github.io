<!DOCTYPE html>
<html lang="zh-cn"><head>
<title>条码校验计算小工具</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="format-detection" content="telephone=no">

<link rel="icon" href="/favicon.ico" type="image/x-icon" sizes="32x32">
<link rel="icon" href="/icons/favicon-180.png" type="image/png" sizes="180x180">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" type="image/png" sizes="512x512">
<link rel="shortcut icon" href="../icons/apple-touch-icon.png" type="image/png" sizes="512x512">
<link rel="bookmark" href="../icons/apple-touch-icon.png" type="image/png" sizes="512x512">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#3063ab">

<meta name="keywords" content="条码校验码,条码最后一位计算,条码校验位计算,条码验证,校验码计算,商品条码校验,条码尾号计算,条码在线计算,条码校验工具">
<meta name="description" content="条码校验码计算小工具，帮你计算和检查条码最后一位数字">
<style>
*{
--hue:#3063ab;
}
body{
-webkit-user-select:none;
user-select:none;
-webkit-touch-callout:none;
touch-callout:none;
-webkit-tap-highlight-color:transparent;
font-family:Verdana,sans-serif;
max-width:800px;
margin:0 auto;
padding:50px;
background-color:#fff;
min-height:100vh;
padding:30px;
}
#title{
color:var(--hue);
text-align:center;
margin-bottom:30px;
font-size:28px;
font-weight:600;
}
#input{
width:100%;
height:48px;
background-color:transparent;
padding:12px 15px;
border:1px solid #e2e8f0;
border-radius:8px;
font-size:16px;
font-family:Verdana,sans-serif;
caret-color:var(--hue);
resize:vertical;
transition:all 0.3s ease;
box-sizing:border-box;
outline:none;
}
#input.error:focus{
border-color:#b20f03!important;
caret-color:#b20f03!important;
}
#input:focus{
border-color:var(--hue);
}
#odd:focus,#even:focus{
border-color:var(--hue);
}

#setup{
margin-top:20px;
margin-bottom:25px;
}
.setup-label{
display:block;
margin:15px 0 8px 0;
color:#101010;
font-weight:500;
font-size:15px;
}
#odd,#even{
padding:10px 15px;
background-color:transparent;
border:1px solid #e2e8f0;
border-radius:8px;
font-size:16px;
color:#2d3748;
margin-right:10px;
transition:all 0.2s ease;
cursor:pointer;
outline:none;
}

#btn{
width:30%;
padding:12px 25px;
background-color:var(--hue);
color:#fff;
border:none;
border-radius:6px;
font-size:16px;
font-weight:500;
cursor:pointer;
transition:all 0.3s ease;
-webkit-tap-highlight-color:rgba(255,255,255,.25);
tap-highlight-color:rgba(255,255,255,.25);
}

#result{
background-color:#fcfcfc;
padding:2px 20px;
margin-top:30px;
border-radius:8px;
border-width:1px;
border-style:solid;
border-color:#e8e8e8;
}
#result-title{
color:#2d3748;
font-size:18px;
font-weight:600;
}
#output{
-webkit-user-select:all;
user-select:all;
height:2em;
width:100%;
margin:20px 0 30px 0;
font-family:Verdana,sans-serif;
overflow-x:auto;
white-space:nowrap;
}
#footer{
text-align:center;
margin-top:50px;
color:#9ca3af;
font-size:13px;
}

@media(prefers-color-scheme:dark){
body{
background-color:#000;
}
#result{
background-color:#080808;
}
#result-title,#odd,#even{
color:#d4d4d4;
}
.setup-label{
color:#f6f6f6;
}
}
</style>
</head>
<body>
<div id="body">
<div id="title">条码校验码计算</div>

<input type="tel" id="input" placeholder="输入条码(不包含校验码)">

<div id="setup">
<label class="setup-label">奇数位乘:</label>
<select id="odd">
<option value="1" selected="">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
<option value="6">6</option>
<option value="7">7</option>
<option value="8">8</option>
<option value="9">9</option>
</select>

<label class="setup-label">偶数位乘:</label>
<select id="even">
<option value="1">1</option>
<option value="2">2</option>
<option value="3" selected="">3</option>
<option value="4">4</option>
<option value="5">5</option>
<option value="6">6</option>
<option value="7">7</option>
<option value="8">8</option>
<option value="9">9</option>
</select>
</div>

<button id="btn" onclick="calculator()">计算</button>

<div id="result">
<h3 id="result-title">计算结果：</h3>
<div id="output"></div>
</div>
</div>

<p id="footer">
© 2026 钓猫的老鼠<br>
<span style="font-size:10px">All Rights Reserved</span>
</p>
<script>
const input = document.getElementById('input');
const odd_select = document.getElementById('odd');
const even_select = document.getElementById('even');
const output = document.getElementById("output");

const hueColor = getComputedStyle(document.documentElement).getPropertyValue('--hue');
const phe = input.placeholder;
var error;

function calculator(){
const code = input.value;
const odd = odd_select.value;
const even = even_select.value;

if(code == ""){
error("请提供输入");
result();
}

let digits = code.replace(/\D/g,''); //移除非数字字符

//将字符串转为数字数组
const digitsArray = digits.split('').map(Number);

//计算加权和：奇数位(1-based from left)×3，偶数位×1
let sum = 0;
for(let i = 0; i < digitsArray.length;i++){
//i从0开始，所以第1位（奇数位）的索引是0

if((i + 1) % 2 === 1){
//奇数位
sum += digitsArray[i] * odd;
}else{
//偶数位
sum += digitsArray[i] * even;
}
}
            
// 计算校验码
const nextMultipleOf10 = Math.ceil(sum / 10) * 10;
const checkDigit = nextMultipleOf10 - sum;

const outputcontent = digits.split("").join("<wbr/>");

output.innerHTML = outputcontent + "<wbr/>" + checkDigit;
}

function error(text){
error = true;
output.innerHTML = "";
input.placeholder = text;
input.classList.add("error");
input.focus();
}

input.addEventListener('keydown', (e)=>{
if(e.key === 'Enter' && !e.shiftKey){
e.preventDefault();
calculator();
}
if(error){
input.placeholder = phe;
input.classList.remove("error");
error = false;
}
});

input.addEventListener('input', ()=>{ //过滤非数字字符
//插入点位置
const cursorStart = input.selectionStart;
const cursorEnd = input.selectionEnd;

const oldValue = input.value;
const newValue = oldValue.replace(/[^0-9]/g, '');

if (oldValue !== newValue) {
input.value = newValue;
//恢复插入点
input.selectionStart = cursorStart - (oldValue.length - newValue.length);
input.selectionEnd = cursorEnd - (oldValue.length - newValue.length);
}
});

input.addEventListener('paste', (e)=>{ //阻止粘贴
e.preventDefault();
const pasteText = (e.clipboardData || window.clipboardData).getData('text');

const numText = pasteText.replace(/[^0-9]/g, '');

const cursorPos = input.selectionStart;
const oldValue = input.value;
input.value = oldValue.slice(0, cursorPos) + numText + oldValue.slice(cursorPos);
// 恢复光标
input.selectionStart = input.selectionEnd = cursorPos + numText.length;
});
</script>

</body>
</html>
